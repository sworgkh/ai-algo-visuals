version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Build on Node 22 (see .nvmrc)
        - nvm install 22
        - nvm use 22
        - node -v
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
